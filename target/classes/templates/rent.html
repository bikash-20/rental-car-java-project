<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Rent a Car', ~{::content})}">
<body>
<div th:fragment="content">

    <div class="page-header">
        <h1 class="page-title">Rent a Car</h1>
        <p class="page-sub">Fill in the details below to book a car</p>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="form-layout">
        <div class="card form-card">
            <form action="/rent" method="post" id="rentForm">

                <div class="field">
                    <label for="carId">Select Car</label>
                    <select name="carId" id="carId" required onchange="updatePrice()">
                        <option value="">— Choose an available car —</option>
                        <option th:each="car : ${availableCars}"
                                th:value="${car.carId}"
                                th:text="${car.carId} + ' — ' + ${car.brand} + ' ' + ${car.model} + ' ($' + ${car.basePricePerDay} + '/day)'"
                                th:data-price="${car.basePricePerDay}">
                        </option>
                    </select>
                </div>

                <div class="field">
                    <label for="name">Your Full Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Bikash Talukder" required/>
                </div>

                <div class="field">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. +91 98765 43210" required/>
                </div>

                <div class="field">
                    <label for="days">Number of Days</label>
                    <input type="number" id="days" name="days" min="1" max="365"
                           placeholder="e.g. 3" required oninput="updatePrice()"/>
                </div>

                <!-- Live Price Preview -->
                <div class="price-preview" id="pricePreview" style="display:none">
                    <span class="preview-label">Estimated Total</span>
                    <span class="preview-price" id="previewAmount">$0</span>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-primary btn-full">✓ Confirm Rental</button>
                    <a href="/" class="btn btn-secondary btn-full">Cancel</a>
                </div>

            </form>
        </div>

        <!-- Available Cars Quick List -->
        <div class="card side-card">
            <h3 class="card-title">Available Cars</h3>
            <div class="car-list">
                <div th:each="car : ${availableCars}" class="car-item"
                     th:onclick="'selectCar(\'' + ${car.carId} + '\', ' + ${car.basePricePerDay} + ')'">
                    <div class="car-item-main">
                        <span class="car-item-name" th:text="${car.brand} + ' ' + ${car.model}">Toyota Camry</span>
                        <span class="badge cat" th:text="${car.category}">Sedan</span>
                    </div>
                    <div class="car-item-price" th:text="'$' + ${car.basePricePerDay} + '/day'">$60/day</div>
                </div>
                <p th:if="${#lists.isEmpty(availableCars)}" class="empty-msg">No cars available right now.</p>
            </div>
        </div>
    </div>

</div>
</body>
</html>
