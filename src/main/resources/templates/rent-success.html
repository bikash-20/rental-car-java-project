<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Rental Confirmed', ~{::content})}">
<body>
<div th:fragment="content">

    <div class="success-page">
        <div class="success-icon">🎉</div>
        <h1 class="success-title">Rental Confirmed!</h1>
        <p class="success-sub">Your car has been successfully booked.</p>

        <div class="receipt card" th:if="${rental}">
            <h3 class="receipt-title">Receipt</h3>
            <div class="receipt-row">
                <span>Customer ID</span>
                <span class="mono" th:text="${rental.customer.customerId}">CUS001</span>
            </div>
            <div class="receipt-row">
                <span>Customer Name</span>
                <span th:text="${rental.customer.name}">John Doe</span>
            </div>
            <div class="receipt-row">
                <span>Phone</span>
                <span th:text="${rental.customer.phone}">+91 99999</span>
            </div>
            <div class="receipt-row">
                <span>Car</span>
                <span th:text="${rental.car.brand} + ' ' + ${rental.car.model}">Toyota Camry</span>
            </div>
            <div class="receipt-row">
                <span>Rental Days</span>
                <span th:text="${rental.days}">3</span>
            </div>
            <div class="receipt-row total-row">
                <span>Total Amount</span>
                <span th:text="'$' + ${#numbers.formatDecimal(rental.totalPrice, 1, 2)}">$180.00</span>
            </div>
            <div class="receipt-row">
                <span>Rented At</span>
                <span th:text="${rental.rentedAtStr}">01 Jan 2025</span>
            </div>
        </div>

        <div class="btn-row center">
            <a href="/" class="btn btn-primary">← Dashboard</a>
            <a href="/rent" class="btn btn-secondary">Rent Another</a>
        </div>
    </div>

</div>
</body>
</html>
